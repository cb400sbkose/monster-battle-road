<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アストラルバトルロード3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<script async src="https://adm.shinobi.jp/st/auto.js" data-admax-id="4dee885fc4a9e4cb271d6308c2bd85ec"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; touch-action:manipulation; }
  html,body { height:100%; background:#06030f; font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; color:#fff; overflow:hidden; }
  #app { position:relative; margin:0 auto; max-width:430px; height:100dvh; background:#0d0822; overflow:hidden; box-shadow:0 0 40px #000; }
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; }
  .hidden { display:none !important; }
  #screen-select { background:radial-gradient(circle at 50% 0%, #2a1a55 0%, #0d0822 70%); padding:12px 12px 10px; }
  .sel-title { text-align:center; font-size:20px; font-weight:900; letter-spacing:2px; color:#ffd95e; text-shadow:0 0 12px #ff8c00,0 2px 0 #5a3a00; margin-bottom:2px; }
  .sel-sub { text-align:center; font-size:11px; color:#bba; margin-bottom:4px; }
  #info-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:6px; }
  #wave-info { font-size:12px; color:#8fe3ff; font-weight:700; }
  #zukan-btn { padding:5px 10px; border:none; border-radius:8px; font-size:11px; font-weight:800; color:#2a1a00; background:linear-gradient(180deg,#ffe9a0,#ffc44e); cursor:pointer; }
  #card-grid { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:4px 2px 12px; align-content:start; }
  .card-tile { position:relative; background:linear-gradient(160deg,#241a4a,#141031); border:2px solid #4a3f7a; border-radius:10px; padding:8px 6px 6px; text-align:center; cursor:pointer; transition:transform .1s; }
  .card-tile:active { transform:scale(.95); }
  .card-tile.picked { border-color:#ffd95e; box-shadow:0 0 12px #ffb52e88; background:linear-gradient(160deg,#3a2c12,#241a4a); }
  .pick-badge { position:absolute; top:-7px; right:-5px; width:22px; height:22px; border-radius:50%; background:#ffd95e; color:#3a2800; font-size:13px; font-weight:900; line-height:22px; box-shadow:0 1px 4px #000; }
  .lv-badge { position:absolute; top:-7px; left:-5px; padding:2px 6px; border-radius:8px; background:#3ec8ff; color:#00253a; font-size:10px; font-weight:900; box-shadow:0 1px 4px #000; }
  .glyph { width:34px; height:34px; margin:2px auto 6px; }
  .g-sphere { border-radius:50%; }
  .g-cube { border-radius:3px; }
  .g-cone { clip-path:polygon(50% 0,100% 100%,0 100%); }
  .g-cylinder { border-radius:10px; }
  .g-torus { background:transparent !important; border:7px solid; border-radius:50%; }
  .g-octahedron { transform:rotate(45deg) scale(.85); border-radius:3px; }
  .t-name { font-size:11px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-rare { font-size:10px; color:#ffd95e; letter-spacing:1px; }
  .t-stats { font-size:9px; color:#aab; margin-top:2px; line-height:1.5; }
  #mode-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
  .big-btn { padding:13px 4px; border:none; border-radius:12px; font-size:15px; font-weight:900; letter-spacing:2px; cursor:pointer; }
  #deploy-btn { color:#3a2400; background:linear-gradient(180deg,#ffe27a,#ffae2e); box-shadow:0 4px 0 #9c5e00,0 6px 14px #0009; }
  #match-btn { color:#001a2e; background:linear-gradient(180deg,#aef4ff,#3ec8ff); box-shadow:0 4px 0 #1a6a9c,0 6px 14px #0009; }
  .big-btn:disabled { filter:grayscale(1) brightness(.55); box-shadow:none; }
  .big-btn:active:not(:disabled) { transform:translateY(3px); box-shadow:none; }
  #match-panel { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; background:#161040; border:1px solid #3a2f6a; border-radius:10px; padding:8px; }
  #word-input { flex:1; min-width:110px; padding:10px; border-radius:8px; border:1px solid #5a4f8a; background:#1c1440; color:#fff; font-size:14px; user-select:text; -webkit-user-select:text; }
  #word-input::placeholder { color:#776fa8; }
  .mini-btn { padding:8px 12px; border:none; border-radius:8px; font-size:12px; font-weight:800; cursor:pointer; }
  #match-start { color:#001a2e; background:linear-gradient(180deg,#aef4ff,#3ec8ff); }
  #match-cancel { color:#fff; background:#4a3f7a; }
  #match-status { width:100%; font-size:11px; color:#8fe3ff; min-height:14px; line-height:1.5; }
  .howto { font-size:9.5px; color:#99a; text-align:center; line-height:1.6; margin-top:5px; }
  /* ===== 図鑑 ===== */
  #screen-zukan { background:radial-gradient(circle at 50% 0%, #1a2a55 0%, #0d0822 70%); padding:12px; }
  #zukan-grid { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:4px 2px 12px; align-content:start; }
  .z-tile { background:linear-gradient(160deg,#241a4a,#141031); border:2px solid #4a3f7a; border-radius:10px; padding:8px 6px 6px; text-align:center; }
  .z-tile.unknown { filter:grayscale(1) brightness(.55); }
  .z-tile.unknown .t-name { color:#667; }
  #zukan-footer { display:flex; gap:8px; margin-top:6px; }
  #zukan-close { flex:1; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:900; color:#3a2400; background:linear-gradient(180deg,#ffe27a,#ffae2e); cursor:pointer; }
  #data-reset { padding:12px 14px; border:1px solid #663; border-radius:10px; font-size:11px; font-weight:700; color:#daa; background:#2a1020; cursor:pointer; }
  #zukan-count { text-align:center; font-size:12px; color:#8fe3ff; font-weight:700; margin-bottom:6px; }
  /* ===== バトル ===== */
  #canvas-wrap { position:relative; flex:1; min-height:0; background:#120b2e; }
  #c { display:block; width:100%; height:100%; }
  #labels,#popups { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .unit-label { position:absolute; transform:translate(-50%,-100%); text-align:center; transition:opacity .3s; }
  .ul-name { font-size:9px; font-weight:700; text-shadow:0 1px 2px #000,0 0 4px #000; white-space:nowrap; }
  .ul-hpbg { width:54px; height:6px; background:#000a; border:1px solid #0008; border-radius:3px; margin:1px auto 0; overflow:hidden; }
  .ul-hp { height:100%; background:linear-gradient(90deg,#3dff7e,#b6ff52); border-radius:2px; transition:width .25s; }
  .ul-hp.low { background:linear-gradient(90deg,#ff9d2e,#ffd34e); }
  .ul-hp.crit { background:linear-gradient(90deg,#ff3a3a,#ff7e5e); }
  .popup { position:absolute; transform:translate(-50%,-50%); font-size:22px; font-weight:900; text-shadow:0 0 6px #000,0 2px 2px #000,2px 0 2px #000; animation:popfloat .9s ease-out forwards; white-space:nowrap; }
  .popup.heal { color:#6dffa0; }
  .popup.dmg-ally { color:#ff6a6a; }
  .popup.dmg-enemy { color:#ffe96a; }
  .popup.big { font-size:30px; color:#ff9a2e; }
  .popup.gauge { color:#7df0ff; font-size:18px; }
  @keyframes popfloat { 0%{opacity:0;transform:translate(-50%,-30%) scale(.5);} 15%{opacity:1;transform:translate(-50%,-60%) scale(1.25);} 30%{transform:translate(-50%,-70%) scale(1);} 100%{opacity:0;transform:translate(-50%,-150%) scale(1);} }
  #flash { position:absolute; inset:0; pointer-events:none; opacity:0; background:#fff; }
  #banner { position:absolute; top:30%; left:0; right:0; text-align:center; pointer-events:none; }
  .banner-text { display:inline-block; font-size:19px; font-weight:900; letter-spacing:1px; color:#fff; text-shadow:0 0 10px #ffae2e,0 0 22px #ff6a00,0 2px 3px #000; animation:bannerpop .25s ease-out; padding:4px 14px; background:linear-gradient(90deg,transparent,#000b 20%,#000b 80%,transparent); border-radius:6px; }
  .banner-text.fusion { font-size:22px; color:#ffe14d; text-shadow:0 0 14px #ff3df0,0 0 30px #ff3df0,0 2px 3px #000; }
  .banner-text.ult { font-size:23px; color:#7df0ff; text-shadow:0 0 14px #2ea0ff,0 0 32px #2e5cff,0 2px 3px #000; }
  .banner-text.wait { font-size:14px; color:#8fe3ff; text-shadow:0 0 8px #2ea0ff,0 2px 3px #000; }
  .banner-text.sp { font-size:21px; color:#9aff8a; text-shadow:0 0 14px #2eff60,0 2px 3px #000; }
  .banner-text.raid { font-size:24px; color:#ffb0e0; text-shadow:0 0 14px #ff30a0,0 2px 3px #000; }
  @keyframes bannerpop { 0%{transform:scale(.3);opacity:0;} 70%{transform:scale(1.15);} 100%{transform:scale(1);opacity:1;} }
  #topbar { position:absolute; top:6px; left:8px; right:8px; display:flex; justify-content:space-between; gap:6px; pointer-events:none; font-size:11px; font-weight:800; color:#cfe; text-shadow:0 1px 3px #000; }
  #battle-ui { background:linear-gradient(180deg,#1a1238,#0d0822); border-top:2px solid #4a3f7a; padding:7px 8px 10px; }
  #gauge-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .gauge-lbl { font-size:10px; font-weight:800; color:#8fe3ff; white-space:nowrap; }
  #gauge-bg { flex:1; height:14px; background:#000a; border:1px solid #4a3f7a; border-radius:7px; overflow:hidden; }
  #gauge-fill { height:100%; width:0%; background:linear-gradient(90deg,#2e8cff,#7df0ff,#fff); border-radius:6px; transition:width .35s; }
  #gauge-bg.full #gauge-fill { animation:gaugeflash .5s infinite alternate; }
  @keyframes gaugeflash { from{filter:brightness(1);} to{filter:brightness(1.8);} }
  #ult-btn { padding:6px 10px; border:none; border-radius:8px; font-size:11px; font-weight:900; color:#001a2e; background:linear-gradient(180deg,#aef4ff,#3ec8ff); box-shadow:0 0 12px #3ec8ff; cursor:pointer; animation:ultpulse .7s infinite alternate; }
  @keyframes ultpulse { from{transform:scale(1);} to{transform:scale(1.08);} }
  #tactic-row { display:flex; gap:6px; margin-bottom:5px; }
  .tac-btn { flex:1; padding:7px 4px; border:1px solid #5a4f8a; border-radius:8px; background:#241a4a; color:#dcd6ff; font-size:11px; font-weight:800; cursor:pointer; }
  .tac-btn.armed { background:linear-gradient(180deg,#9aff8a,#3ecf5e); color:#003a10; border-color:#bfffb0; }
  .tac-btn.armed.raid { background:linear-gradient(180deg,#ffb0e0,#ff5eb0); color:#3a0022; border-color:#ffd0ec; }
  .tac-btn:disabled { opacity:.45; }
  #overlay-panel { position:absolute; inset:0; background:#000b; z-index:30; display:flex; align-items:center; justify-content:center; }
  .ov-box { width:88%; max-height:80%; overflow-y:auto; background:#1a1240; border:2px solid #5a4f8a; border-radius:14px; padding:12px; }
  .ov-title { text-align:center; font-size:15px; font-weight:900; color:#ffd95e; margin-bottom:8px; }
  .sp-item { display:block; width:100%; text-align:left; margin-top:6px; padding:9px; border:1px solid #5a4f8a; border-radius:9px; background:#241a4a; color:#fff; cursor:pointer; }
  .sp-item .sp-name { font-size:13px; font-weight:900; color:#9aff8a; }
  .sp-item .sp-desc { font-size:10.5px; color:#bbc; margin-top:2px; line-height:1.4; }
  .hand-row { display:flex; gap:8px; justify-content:center; margin:10px 0; }
  .hand-btn { font-size:34px; padding:10px 14px; border:2px solid #5a4f8a; border-radius:12px; background:#241a4a; cursor:pointer; }
  .ov-cancel { display:block; width:100%; margin-top:10px; padding:10px; border:none; border-radius:9px; background:#4a3f7a; color:#fff; font-size:13px; font-weight:800; cursor:pointer; }
  #cmd-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .cmd-card { background:#1c1440; border:2px solid #3a2f6a; border-radius:9px; padding:5px; text-align:center; }
  .cmd-card.dead { opacity:.35; filter:grayscale(1); }
  .cmd-head { display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:3px; }
  .cmd-dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .cmd-name { font-size:10px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cmd-hpbg { height:5px; background:#000a; border-radius:3px; overflow:hidden; margin-bottom:4px; }
  .cmd-hp { height:100%; background:linear-gradient(90deg,#3dff7e,#b6ff52); transition:width .25s; }
  .skill-btn { display:block; width:100%; margin-top:3px; padding:6px 2px; border:1px solid #5a4f8a; border-radius:6px; background:#2a2055; color:#dcd6ff; font-size:9.5px; font-weight:700; cursor:pointer; line-height:1.25; }
  .skill-btn .se { font-size:8px; opacity:.85; }
  .skill-btn.sel { background:linear-gradient(180deg,#ffd95e,#ff9e2e); color:#3a2400; border-color:#ffe9a0; box-shadow:0 0 8px #ffb52e; }
  .skill-btn:disabled { opacity:.5; }
  #fusion-preview { min-height:15px; text-align:center; font-size:11px; font-weight:900; color:#ff7df0; text-shadow:0 0 8px #ff3df0; margin:4px 0 2px; }
  #go-btn { display:block; width:100%; padding:11px; border:none; border-radius:10px; font-size:16px; font-weight:900; letter-spacing:5px; color:#3a0a00; background:linear-gradient(180deg,#ff9a5e,#ff5e2e); box-shadow:0 3px 0 #8c2400; cursor:pointer; }
  #go-btn:disabled { filter:grayscale(1) brightness(.5); box-shadow:none; }
  #go-btn:active:not(:disabled) { transform:translateY(2px); box-shadow:0 1px 0 #8c2400; }
  /* ===== リザルト ===== */
  #screen-result { background:radial-gradient(circle at 50% 30%, #2a1a55 0%, #0d0822 70%); align-items:center; justify-content:center; gap:12px; padding:20px; }
  #result-title { font-size:42px; font-weight:900; letter-spacing:6px; animation:bannerpop .4s ease-out; }
  #result-title.win { color:#ffd95e; text-shadow:0 0 18px #ff8c00,0 3px 0 #5a3a00; }
  #result-title.lose { color:#7a8fbb; text-shadow:0 0 14px #2e4cff; }
  #result-msg { font-size:13px; color:#ccd; text-align:center; line-height:1.6; }
  .drop-label { font-size:13px; font-weight:800; color:#ff7df0; text-shadow:0 0 8px #ff3df0; }
  #reward-card { width:160px; height:226px; border-radius:14px; padding:14px 10px; text-align:center; background:linear-gradient(160deg,#241a4a,#141031); border:3px solid #ffd95e; box-shadow:0 0 24px #ffb52e66; animation:cardflip .8s ease-out; }
  @keyframes cardflip { 0%{transform:rotateY(90deg) scale(.6);opacity:0;} 60%{transform:rotateY(-15deg) scale(1.05);opacity:1;} 100%{transform:rotateY(0) scale(1);} }
  #reward-card .glyph { width:56px; height:56px; margin:6px auto 8px; }
  #reward-card .g-torus { border-width:11px; }
  .rc-name { font-size:14px; font-weight:900; }
  .rc-rare { color:#ffd95e; font-size:13px; letter-spacing:2px; margin-top:2px; }
  .rc-stats { font-size:10.5px; color:#bbc; margin-top:6px; line-height:1.6; }
  .rc-new { font-size:11px; color:#6dffa0; font-weight:800; margin-top:5px; }
  .rc-new.lvup { color:#7df0ff; }
  #next-btn { padding:13px 38px; border:none; border-radius:12px; font-size:16px; font-weight:900; letter-spacing:2px; color:#3a2400; background:linear-gradient(180deg,#ffe27a,#ffae2e); box-shadow:0 4px 0 #9c5e00; cursor:pointer; }
  #next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #9c5e00; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-select" class="screen">
    <div class="sel-title">⚔ アストラルバトルロード 3D ⚔</div>
    <div class="sel-sub">パーティ編成 ─ モンスター全50種</div>
    <div id="info-row"><span id="wave-info"></span><button id="zukan-btn">📖 図鑑</button></div>
    <div id="card-grid"></div>
    <div id="mode-row">
      <button id="deploy-btn" class="big-btn" disabled>ひとりで出撃</button>
      <button id="match-btn" class="big-btn" disabled>合言葉マッチ</button>
    </div>
    <div id="match-panel" class="hidden">
      <input id="word-input" maxlength="12" placeholder="あいことば（友達と同じ言葉）">
      <button id="match-start" class="mini-btn">開始</button>
      <button id="match-cancel" class="mini-btn">やめる</button>
      <div id="match-status"></div>
    </div>
    <div class="howto">カード3枚で出撃！ 属性の組み合わせで「合体技」、ゲージMAXで「超必殺技」！<br>SPカードと「突撃」(じゃんけんでゲージ強奪)は1バトル1回。10戦ごとにボス出現、30戦でステージクリア！</div>
  </div>

  <div id="screen-zukan" class="screen hidden">
    <div class="sel-title">📖 モンスター図鑑</div>
    <div id="zukan-count"></div>
    <div id="zukan-grid"></div>
    <div id="zukan-footer">
      <button id="zukan-close">とじる</button>
      <button id="data-reset">データ初期化</button>
    </div>
  </div>

  <div id="screen-battle" class="screen hidden">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="labels"></div>
      <div id="popups"></div>
      <div id="flash"></div>
      <div id="banner"></div>
      <div id="topbar"><span id="tb-wave"></span><span id="tb-opp"></span><span id="tb-turn"></span></div>
      <div id="overlay-panel" class="hidden"></div>
    </div>
    <div id="battle-ui">
      <div id="gauge-row">
        <span class="gauge-lbl">必殺ゲージ</span>
        <div id="gauge-bg"><div id="gauge-fill"></div></div>
        <button id="ult-btn" class="hidden">超必殺技！</button>
      </div>
      <div id="tactic-row">
        <button id="sp-btn" class="tac-btn">🃏 SPカード</button>
        <button id="raid-btn" class="tac-btn">⚡ 突撃</button>
      </div>
      <div id="cmd-row"></div>
      <div id="fusion-preview"></div>
      <button id="go-btn" disabled>たたかう！</button>
    </div>
  </div>

  <div id="screen-result" class="screen hidden">
    <div id="result-title"></div>
    <div id="result-msg"></div>
    <div class="drop-label">▼ カードドロップ！ ▼</div>
    <div id="reward-card"></div>
    <button id="next-btn">次のバトルへ</button>
  </div>

</div>

<script>
/* ================================================================
   アストラルバトルロード 3D  v2
   - オリジナルモンスター50種 / レベルアップ / 図鑑 / セーブ
   - SPカード / 突撃(じゃんけん) / ステージ制 / ボス戦
   - 合言葉マッチ: PeerJS リアルタイム通信対戦 (ロックステップ同期)
   ================================================================ */
'use strict';

/* ---------------- 属性 ---------------- */
const ELEMS = {
  phys:    { jp:'物理', color:'#d8d8d8' },
  slash:   { jp:'斬撃', color:'#9ad6ff' },
  fire:    { jp:'炎',   color:'#ff6a3d' },
  ice:     { jp:'氷',   color:'#7fd8ff' },
  thunder: { jp:'雷',   color:'#ffe14d' },
  earth:   { jp:'大地', color:'#c98f4e' },
  dark:    { jp:'闇',   color:'#b06aff' },
  holy:    { jp:'光',   color:'#fff3b0' },
  heal:    { jp:'回復', color:'#7dffa8' },
};
function S(name, elem, mult, target){ return { name, elem, mult, target:target||'one' }; }

/* ---------------- モンスターカード 全50種 (オリジナル) ----------------
   バランス方針: HPを厚く・倍率を控えめに・速度差を圧縮して先行有利を緩和 */
const CARD_POOL = [
  // ━━━ ★1 (14種) ━━━
  { id:1,  name:'ポヨゴル',         shape:'sphere',     color:0x3a7bff, hp:185, atk:24, spd:11, rare:1, skills:[S('ポヨタックル','phys',1.05), S('フロストニードル','ice',1.25)] },
  { id:2,  name:'ガレオス',         shape:'cube',       color:0x8a6f4d, hp:230, atk:26, spd:7,  rare:1, skills:[S('ガレオパンチ','phys',1.2), S('グランドロア','earth',0.78,'all')] },
  { id:3,  name:'モグリン',         shape:'cylinder',   color:0x996633, hp:180, atk:23, spd:9,  rare:1, skills:[S('クロースクラッチ','phys',1.0), S('ダストヴェイル','earth',1.1)] },

/* レベル補正: HP+7%/Lv, 攻撃+5%/Lv, 速度+1/3Lv (最大Lv10) */
const MAX_LV = 10;
function instCard(id, lv){
  const c = cardById(id);
  lv = Math.max(1, Math.min(MAX_LV, lv|0 || 1));
  return {
    ...c, lv,
    hp:  Math.round(c.hp  * (1 + 0.07*(lv-1))),
    atk: Math.round(c.atk * (1 + 0.05*(lv-1))),
    spd: c.spd + Math.floor((lv-1)/3),
  };
}

const SAVE_KEY = 'astral_battle_road_v2';
function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v:2, owned:state.owned, stage:state.stage, stageBattle:state.stageBattle,
      streak:state.streak, allClear:state.allClear,
    }));
  }catch(e){}
}
function loadGame(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(d && d.v===2 && d.owned){
      state.owned = {};
      for(const k in d.owned){
        const id = +k, lv = Math.max(1, Math.min(MAX_LV, d.owned[k]|0));
        if(CARD_POOL.some(c=>c.id===id)) state.owned[id] = lv;
      }
      state.stage = Math.max(1, Math.min(STAGE_MAX, d.stage|0 || 1));
      state.stageBattle = Math.max(1, Math.min(STAGE_LEN, d.stageBattle|0 || 1));
      state.streak = Math.max(0, d.streak|0);
      state.allClear = !!d.allClear;
    }
  }catch(e){}
  if(Object.keys(state.owned).length===0){
    state.owned = { 1:1, 15:1, 2:1, 16:1 };
  }
}
function resetGame(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  location.reload();
}

  return new Promise(res=>{
    const t0 = performance.now();
    (function step(t){

      fn(k);
      if(k<1) requestAnimationFrame(step); else res();
    })(t0);
  });
}

/* ----- ゲームロジック用乱数 (PvPはシード同期) ----- */
let rngFn = Math.random;
function mulberry32(a){
  return function(){
    a|=0; a = a+0x6D2B79F5|0;
    let t = Math.imul(a^a>>>15, 1|a);
    t = t+Math.imul(t^t>>>7, 61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
const grand = (a,b) => a + rngFn()*(b-a);
const gri = n => Math.floor(rngFn()*n);
function hashWord(w){
  let h = 5381;
  for(const ch of w){ h = ((h*33) ^ ch.codePointAt(0)) >>> 0; }
  return h.toString(36) + w.length.toString(36);
}
/* じゃんけん: 1=aの勝ち -1=bの勝ち 0=あいこ (0=グー 1=チョキ 2=パー) */
function janken(a, b){
  if(a===b) return 0;
  return ((b-a+3)%3===1) ? 1 : -1;
}

function modMult(side, stat){
  let m = 1;
  for(const md of state.mods[side]) if(md.stat===stat) m *= md.mult;
  return m;
}
function addMod(side, stat, mult, turns){
  state.mods[side].push({ stat, mult, turns });
}
function decayMods(){
  for(const side of ['A','B']){
    for(const md of state.mods[side]) md.turns--;
    state.mods[side] = state.mods[side].filter(md=>md.turns>0);
  }
}
function effAtk(u){ return Math.max(1, Math.round(u.atk * modMult(u.side,'atk'))); }
function effSpd(u){ return u.spd * modMult(u.side,'spd'); }

let actx = null;
function snd(freq, dur=0.1, type='square', vol=0.12, slide=0){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    if(slide) o.frequency.linearRampToValueAtTime(Math.max(20,freq+slide), actx.currentTime+dur);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

function makeBody(shape, color){
  let geo;
  switch(shape){
    case 'cube':       geo = new THREE.BoxGeometry(1.1,1.1,1.1); break;
    case 'cone':       geo = new THREE.ConeGeometry(0.72,1.5,20); break;
    case 'cylinder':   geo = new THREE.CylinderGeometry(0.5,0.62,1.35,20); break;
    case 'torus':      geo = new THREE.TorusGeometry(0.55,0.23,14,28); break;
    case 'octahedron': geo = new THREE.OctahedronGeometry(0.8); break;
    default:           geo = new THREE.SphereGeometry(0.68,24,18);
  }
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color, roughness:0.35, metalness:0.35, emissive:0x000000
  }));
}
function createUnit(data, side, idx, opts){
  opts = opts || {};
  const isAlly = (side === state.mySide);
  const group = new THREE.Group();
  const body = makeBody(data.shape, data.color);
  group.add(body);
  const eyeG = new THREE.SphereGeometry(0.1,10,8);
  const pupG = new THREE.SphereGeometry(0.05,8,6);
  for(const sx of [-0.24, 0.24]){
    const e = new THREE.Mesh(eyeG, new THREE.MeshBasicMaterial({color:0xffffff}));
    e.position.set(sx, 0.22, 0.58);
    const p = new THREE.Mesh(pupG, new THREE.MeshBasicMaterial({color:0x111122}));
    p.position.set(sx, 0.22, 0.66);
    group.add(e); group.add(p);
  }
  const sh = new THREE.Mesh(
    new THREE.CircleGeometry(0.62,20),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.35 })
  );
  sh.rotation.x = -Math.PI/2; sh.position.y = -0.74; group.add(sh);

  const scl = opts.scale || 1;
  group.scale.setScalar(scl);
  const xs = isAlly ? [-1.95,0,1.95] : [-2.1,0,2.1];
  const home = new THREE.Vector3(xs[idx], 0.8*scl, isAlly ? 2.6 : -3.0);

  return {
    data, side, isAlly, idx, group, body, home, baseRotY, scl,
    hp:data.hp, maxHp:data.hp, atk:data.atk, spd:data.spd,

/* ---------------- パーティクル ---------------- */
const particles = [];
const partGeo = new THREE.SphereGeometry(0.07,6,5);
function burst(pos, color, n=22, speed=3.2, size=1, gravity=4){
  for(let i=0;i<n;i++){
    const m = new THREE.Mesh(partGeo, new THREE.MeshBasicMaterial({ color, transparent:true, opacity:1 }));
    m.position.copy(pos);
    m.scale.setScalar(size*rand(0.6,1.6));
    const th = rand(0,Math.PI*2), ph = rand(0,Math.PI);
    const v = new THREE.Vector3(
      Math.sin(ph)*Math.cos(th), Math.cos(ph)*0.9+0.4, Math.sin(ph)*Math.sin(th)
    ).multiplyScalar(speed*rand(0.4,1.1));
    scene.add(m);
    particles.push({ m, v, life:1, decay:rand(1.4,2.4), g:gravity });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= p.decay*dt;
    if(p.life<=0){ scene.remove(p.m); p.m.material.dispose(); particles.splice(i,1); continue; }
    p.m.position.addScaledVector(p.v, dt);
    p.v.y -= p.g*dt;
    p.m.material.opacity = Math.max(0,p.life);
    p.m.scale.multiplyScalar(0.985);
  }
}

/* ---------------- メインループ ---------------- */
let lastT = performance.now();
function loop(t){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05,(t-lastT)/1000); lastT = t;
  for(const u of allUnits()){
    if(u.alive && !u.busy){
      u.group.position.y = u.home.y + Math.sin(t*0.003 + u.bobOff)*0.09;
      u.group.rotation.z = Math.sin(t*0.002 + u.bobOff)*0.04;
    }
  }
  updateParticles(dt);
  if(shakeAmt > 0.001){
    camera.position.set(
      camBase.x + rand(-1,1)*shakeAmt,
      camBase.y + rand(-1,1)*shakeAmt,
      camBase.z + rand(-1,1)*shakeAmt*0.5
    );
    shakeAmt *= Math.pow(0.0001, dt);
  } else camera.position.copy(camBase);
  camera.lookAt(camLook);
  for(const u of allUnits()){
    if(!u.label) continue;
    if(!u.alive){ u.label.style.opacity = 0; continue; }
    const s = worldToScreen(u.group.position.clone().add(new THREE.Vector3(0,1.25*u.scl,0)));
    u.label.style.left = s.x+'px';
    u.label.style.top  = s.y+'px';
  }
  renderer.render(scene, camera);
}
requestAnimationFrame(loop);

/* ---------------- 合言葉マッチング (PeerJS) ---------------- */
function matchStatus(msg){ $('#match-status').textContent = msg; }
function cleanupPvp(){
  pvp.closedHandled = true;
  try{ if(pvp.conn) pvp.conn.close(); }catch(e){}
  try{ if(pvp.peer) pvp.peer.destroy(); }catch(e){}
  pvp.peer = null; pvp.conn = null; pvp.isHost = false; pvp.seed = null;
  pvp.oppParty = null; pvp.myMoves = null; pvp.oppMoves = {};
  pvp.started = false; pvp.connected = false; pvp.closedHandled = false; pvp.cancelled = false;
  pvp.lostConn = false;
}
$('#match-start').addEventListener('click', startMatching);
$('#match-cancel').addEventListener('click', ()=>{
  pvp.cancelled = true;
  cleanupPvp();
  matchStatus('マッチングを中止しました');
});
function startMatching(){
  const word = $('#word-input').value.trim();
  if(!word){ matchStatus('合言葉を入力してね'); return; }
  if(state.picked.length!==3){ matchStatus('先にカードを3枚えらんでね'); return; }
  if(typeof Peer === 'undefined'){ matchStatus('通信ライブラリを読み込めなかった…ネット接続を確認してね'); return; }
  cleanupPvp();
  pvp.pickedIds = [...state.picked];
  matchStatus('せつぞく中…');
  const hostId = 'abr3dv2-' + hashWord(word);
  const p = new Peer(hostId);
  pvp.peer = p;
  p.on('open', ()=>{
    if(pvp.cancelled) return;
    pvp.isHost = true;
    matchStatus(`部屋を作ったよ！ 友達が同じ合言葉「${word}」で参加するのを待っています…`);
  });
  p.on('connection', conn=>{
    if(pvp.conn){ try{conn.close();}catch(e){} return; }
    bindConn(conn);
  });
  p.on('error', err=>{
    if(pvp.cancelled) return;
    if(err.type==='unavailable-id'){
      matchStatus('友達の部屋を発見！ 接続中…');
      const p2 = new Peer();
      pvp.peer = p2;
      p2.on('open', ()=>{
        if(pvp.cancelled) return;
        pvp.isHost = false;
        const conn = p2.connect(hostId, { reliable:true });
        bindConn(conn);
        setTimeout(()=>{
          if(!pvp.connected && !pvp.cancelled && !pvp.started){
            matchStatus('接続できなかった…もう一度ためしてね');
            cleanupPvp();
          }
        }, 15000);
      });
      p2.on('error', e2=>{
        if(pvp.cancelled || pvp.connected) return;
        if(e2.type==='peer-unavailable'){
          matchStatus('部屋が見つからなかった…もう一度「開始」を押してね');
        } else {
          matchStatus('通信エラー ('+e2.type+')…もう一度ためしてね');
        }
      });
    } else if(!pvp.connected){
      matchStatus('通信エラー ('+err.type+')。ネット環境によっては繋がらないことがあるよ');
    }
  });
}
function bindConn(conn){
  pvp.conn = conn;
  conn.on('open', ()=>{
    if(pvp.cancelled){ try{conn.close();}catch(e){} return; }
    pvp.connected = true;
    matchStatus('マッチ成立！ バトル準備中…');
    const party = pvp.pickedIds.map(id => ({ id, lv: state.owned[id]||1 }));
    conn.send({ t:'hello', v:2, party });
  });
  conn.on('data', handleMsg);
  conn.on('close', onPvpClosed);
  conn.on('error', onPvpClosed);
}
function handleMsg(m){
  if(!m || typeof m!=='object') return;
  if(m.t==='hello'){
    if(m.v!==2){ matchStatus('相手のゲームのバージョンが違うみたい…同じURLの最新版を使ってね'); return; }
    if(Array.isArray(m.party) && m.party.length===3){
      pvp.oppParty = m.party.map(e=>({ id:cardById(e&&e.id).id, lv:Math.max(1,Math.min(MAX_LV,(e&&e.lv)|0||1)) }));
      if(pvp.isHost){
        pvp.seed = (Math.random()*0xFFFFFFFF)>>>0;
        try{ pvp.conn.send({ t:'start', seed:pvp.seed }); }catch(e){}
      }
      tryStartPvp();
    }
  } else if(m.t==='start'){
    pvp.seed = m.seed>>>0;
    tryStartPvp();
  } else if(m.t==='moves'){
    pvp.oppMoves[m.turn] = m;
    tryResolve();
  }
}
function tryStartPvp(){
  if(pvp.oppParty && pvp.seed!==null && pvp.connected && !pvp.started){
    pvp.started = true;
    $('#match-panel').classList.add('hidden');
    startBattle('pvp');
  }
}
function onPvpClosed(){
  if(pvp.closedHandled) return;
  pvp.closedHandled = true;
  if(state.mode==='pvp' && pvp.started && !state.ended){
    if(state.phase==='anim'){
      pvp.lostConn = true;
    } else {
      showBanner('あいてとの通信がきれた！', 1500);
      setTimeout(()=>endBattle(true, '（あいてが切断したため勝利）'), 900);
    }
  } else if(!pvp.started){
    matchStatus('通信がきれた…もう一度ためしてね');
  }
}
/* ---------------- 難易度 (ステージ×進行×連勝) ---------------- */
function diffFactors(){
  const base = [1, 1.7, 2.6, 3.6, 4.8][state.stage-1];
  const hpF = base * (1 + (state.stageBattle-1)*0.018) * (1 + Math.min(state.streak,50)*0.008);
  const atkF = 1 + (hpF-1)*0.55;
  return { hpF, atkF };
}

/* ---------------- バトル開始 ---------------- */
function startBattle(mode){
  state.mode = mode;
  for(const u of allUnits()) removeUnit(u);
  for(const p of particles) scene.remove(p.m);
  particles.length = 0;
  $('#popups').innerHTML = ''; $('#banner').innerHTML = '';
  $('#overlay-panel').classList.add('hidden'); $('#overlay-panel').innerHTML = '';

  state.mySide = (mode==='pvp' && !pvp.isHost) ? 'B' : 'A';
  const oppS = otherSide(state.mySide);
  state.units = { A:[], B:[] };
  state.bossBattle = false;

  const pickedIds = (mode==='pvp') ? pvp.pickedIds : state.picked;
  state.units[state.mySide] = pickedIds.map((id,i)=>
    createUnit(instCard(id, state.owned[id]||1), state.mySide, i)
  );

  if(mode==='pvp'){
    state.units[oppS] = pvp.oppParty.map((e,i)=>createUnit(instCard(e.id, e.lv), oppS, i));
  } else {
    const { hpF, atkF } = diffFactors();
    state.bossBattle = (state.stageBattle % 10 === 0);
    if(state.bossBattle){
      const bs = state.stageBattle===10 ? 0.7 : state.stageBattle===20 ? 0.85 : 1.05;
      const bossBase = STAGE_BOSSES[state.stage-1];
      const boss = {
        ...bossBase,
        hp:  Math.round(bossBase.hp * bs * hpF),
        atk: Math.round(bossBase.atk * (0.8+0.2*bs) * atkF),
      };
      const mIdx = [Math.floor(Math.random()*ENEMY_POOL.length), Math.floor(Math.random()*ENEMY_POOL.length)];
      const minions = mIdx.map(j=>{
        const e = ENEMY_POOL[j];
        return { ...e, hp:Math.round(e.hp*0.85*hpF), atk:Math.round(e.atk*0.85*atkF) };
      });
      state.units.B = [
        createUnit(minions[0], 'B', 0),
        createUnit(boss, 'B', 1, { boss:true, scale:1.45 }),
        createUnit(minions[1], 'B', 2),
      ];
    } else {
      const picks = [];
      while(picks.length<3) picks.push(ENEMY_POOL[Math.floor(Math.random()*ENEMY_POOL.length)]);
      state.units.B = picks.map((e,i)=>{
        const d = { ...e, hp:Math.round(e.hp*hpF), atk:Math.round(e.atk*atkF) };
        return createUnit(d, 'B', i);
      });
    }
  }

  state.turn = 1;
  state.gauge = { A:0, B:0 };
  state.spUsed = { A:false, B:false };
  state.raidUsed = { A:false, B:false };
  state.mods = { A:[], B:[] };
  state.pendingSp = null; state.pendingRaid = null;
  state.ended = false;
  pvp.myMoves = null;
  showScreen('battle');
  showBanner(
    mode==='pvp' ? '⚔ 合言葉マッチ成立！ バトルスタート！ ⚔'
    : state.bossBattle ? `👑 ボスバトル！！ ${STAGE_BOSSES[state.stage-1].name}出現！ 👑`
    : `ステージ${state.stage} 第${state.stageBattle}戦  スタート！`, 1500);
  startSelection();
}

/* ---------------- コマンド選択フェーズ ---------------- */
function startSelection(){
  state.phase = 'select';
  state.mySel = [null,null,null];
  state.pendingSp = null; state.pendingRaid = null;
  $('#tb-wave').textContent = state.mode==='pvp' ? '⚔ 通信対戦' : `S${state.stage} ${state.stageBattle}/${STAGE_LEN}${state.bossBattle?' 👑':''}`;
  $('#tb-turn').textContent = `TURN ${state.turn}`;
  updateOppGaugeUI();
  const row = $('#cmd-row');
  row.innerHTML = '';
  myUnits().forEach((u,i)=>{
    const card = document.createElement('div');
    card.className = 'cmd-card' + (u.alive?'':' dead');
    const hpP = Math.max(0, u.hp/u.maxHp*100);
    card.innerHTML = `
      <div class="cmd-head"><span class="cmd-dot" style="background:${hexCss(u.data.color)}"></span><span class="cmd-name">${u.data.name}</span></div>
      <div class="cmd-hpbg"><div class="cmd-hp" style="width:${hpP}%"></div></div>`;
    u.data.skills.forEach((sk,si)=>{
      const btn = document.createElement('button');
      btn.className = 'skill-btn';
      btn.disabled = !u.alive;
      btn.innerHTML = `${si===0?'Ⓐ':'Ⓑ'} ${sk.name}<br><span class="se">[${ELEMS[sk.elem].jp}${sk.target==='all'?'・全体':sk.target==='allies'?'・味方':''}]</span>`;
      btn.addEventListener('click', ()=>{
        if(state.phase!=='select') return;
        state.mySel[i] = si;
        sndSelect();
        card.querySelectorAll('.skill-btn').forEach((b,bi)=>b.classList.toggle('sel', bi===si));
        updateFusionPreview();
        updateGoBtn();
      });
      card.appendChild(btn);
    });
    row.appendChild(card);
  });
  updateFusionPreview();
  updateGoBtn();
  updateGaugeUI();
  updateTacticBtns();
}
function allSelected(){
  return myUnits().every((u,i)=>!u.alive || state.mySel[i]!==null);
}
function updateGoBtn(){ $('#go-btn').disabled = !(state.phase==='select' && allSelected()); }
function updateGaugeUI(){
  $('#gauge-fill').style.width = state.gauge[state.mySide]+'%';
  $('#gauge-bg').classList.toggle('full', state.gauge[state.mySide]>=100);
  $('#ult-btn').classList.toggle('hidden', !(state.gauge[state.mySide]>=100 && state.phase==='select'));
  updateOppGaugeUI();
}
function updateOppGaugeUI(){
  $('#tb-opp').textContent = state.mode==='pvp' ? `あいてゲージ ${state.gauge[otherSide(state.mySide)]}%` : '';
}
function addGaugeFor(side, n){
  state.gauge[side] = Math.min(100, state.gauge[side]+n);
  updateGaugeUI();
}
function findFusionFor(side, sel){
  const picks = [];
  state.units[side].forEach((u,i)=>{
    if(u.alive && (sel[i]===0 || sel[i]===1)){
      picks.push({ u, skill:u.data.skills[sel[i]] });
    }
  });
  for(const r of RECIPES){
    for(let a=0;a<picks.length;a++){
      for(let b=0;b<picks.length;b++){
        if(a===b) continue;
        if(picks[a].skill.elem===r.elems[0] && picks[b].skill.elem===r.elems[1]){
          return { recipe:r, pair:[picks[a],picks[b]] };
        }
      }
    }
  }
  return null;
}
function updateFusionPreview(){
  const f = findFusionFor(state.mySide, state.mySel);
  $('#fusion-preview').textContent = f ? `⚡ 合体技『${f.recipe.name}』スタンバイ！！ ⚡` : '';
}
function lockSelectionUI(){
  $('#go-btn').disabled = true;
  $('#ult-btn').classList.add('hidden');
  $('#sp-btn').disabled = true;
  $('#raid-btn').disabled = true;
  document.querySelectorAll('.skill-btn').forEach(b=>b.disabled=true);
  $('#fusion-preview').textContent = '';
}

$('#raid-btn').addEventListener('click', openRaidPanel);

/* ----- 行動確定 ----- */
$('#go-btn').addEventListener('click', ()=>{
  if(state.phase==='select' && allSelected()) confirmMoves(false);
});
$('#ult-btn').addEventListener('click', ()=>{
  if(state.phase==='select' && state.gauge[state.mySide]>=100) confirmMoves(true);
});
function confirmMoves(ult){
  const my = state.mySide;
  const sp = (!state.spUsed[my] && state.pendingSp!==null) ? state.pendingSp : null;
  const raidHand = (!state.raidUsed[my] && state.pendingRaid!==null) ? state.pendingRaid : null;
  state.pendingSp = null; state.pendingRaid = null;
  if(state.mode==='pve'){
    rngFn = Math.random;
    const plans = {};
    plans[my] = { sel:[...state.mySel], ult, sp, raidHand };
    plans[otherSide(my)] = { ai:true };
    runTurnWith(plans);
  } else {
    state.phase = 'wait';
    lockSelectionUI();
    pvp.myMoves = { t:'moves', turn:state.turn, sel:[...state.mySel], ult, sp, raidHand };
    try{ pvp.conn.send(pvp.myMoves); }catch(e){}
    showBanner('あいての行動をまっています…', 60000, 'wait');
    tryResolve();
  }
}
function sanitizeSel(sel){
  const out = [null,null,null];
  if(Array.isArray(sel)) for(let i=0;i<3;i++) if(sel[i]===0||sel[i]===1) out[i]=sel[i];
  return out;
}
function sanMoves(m){
  return {
    sel: sanitizeSel(m.sel),
    ult: !!m.ult,
    sp: (Number.isInteger(m.sp) && m.sp>=0 && m.sp<SP_CARDS.length) ? m.sp : null,
    raidHand: (Number.isInteger(m.raidHand) && m.raidHand>=0 && m.raidHand<=2) ? m.raidHand : null,
  };
}
function tryResolve(){
  if(state.mode!=='pvp' || state.phase!=='wait') return;
  const om = pvp.oppMoves[state.turn];
  if(!pvp.myMoves || pvp.myMoves.turn!==state.turn || !om) return;
  rngFn = mulberry32((pvp.seed ^ Math.imul(state.turn, 0x9E3779B9)) >>> 0);
  const plans = {};
  plans[state.mySide] = sanMoves(pvp.myMoves);
  plans[otherSide(state.mySide)] = sanMoves(om);
  pvp.myMoves = null;
  delete pvp.oppMoves[state.turn];
  runTurnWith(plans);
}

/* ---------------- ダメージ処理 ---------------- */
function calcDmg(atk, mult){ return Math.max(1, Math.round(atk*mult*grand(0.9,1.1))); }
async function applyDamage(target, dmg, attacker, popCls){
  const real = Math.max(1, Math.round(dmg * modMult(target.side,'def')));
  target.hp = Math.max(0, target.hp - real);
  showPopup(target.group.position.clone().add(new THREE.Vector3(0,0.9*target.scl,0)), real, popCls||(target.isAlly?'dmg-ally':'dmg-enemy'));
  flashBody(target);
  updateHpUI(target);
  addGaugeFor(target.side, 12);
  if(attacker) addGaugeFor(attacker.side, 6);
  if(target.hp<=0 && target.alive) await killUnit(target);
}
function applyHeal(target, amt){
  if(!target.alive) return;
  const real = Math.min(amt, target.maxHp-target.hp);
  target.hp += real;
  showPopup(target.group.position.clone().add(new THREE.Vector3(0,0.9*target.scl,0)), '+'+real, 'heal');
  updateHpUI(target);
}
function updateHpUI(u){
  const p = Math.max(0, u.hp/u.maxHp*100);
  const bar = u.label.querySelector('.ul-hp');
  bar.style.width = p+'%';
  bar.className = 'ul-hp' + (p<=25?' crit':p<=50?' low':'');
  if(u.isAlly){
    const c = $('#cmd-row').children[u.idx];
    if(c){ const b = c.querySelector('.cmd-hp'); if(b) b.style.width = p+'%'; }
  }
}
async function killUnit(u){
  u.alive = false; u.busy = true;
  snd(80,0.4,'sawtooth',0.12,-40);
  burst(u.group.position.clone(), u.data.color, u.boss?44:26, u.boss?4.5:3.5, u.boss?1.6:1.2);
  if(u.boss){ shake(0.6); flashScreen('#fff', 300, 0.5); }
  await tween(420, k=>{
    u.group.scale.setScalar(u.scl*(1-easeIn(k)));
    u.group.rotation.y += 0.25;
  });
  u.group.visible = false;
}

/* ---------------- 攻撃アニメーション (ダメージは事前計算済み) ---------------- */
async function meleeAttack(u, plans, skill){
  u.busy = true;
  const p0 = plans[0];
  const from = u.home.clone();
  const dir = p0.t.group.position.clone().sub(from);
  const to = from.clone().addScaledVector(dir, 0.7);
  to.y = from.y;
  showBanner(`${bannerName(u)}の ${skill.name}！`, 800);
  await tween(240, k=>{
    u.group.position.lerpVectors(from, to, easeIn(k));
    u.group.position.y = from.y + Math.sin(k*Math.PI)*0.9;
    u.group.rotation.y += 0.45;
  });
  sndHit();
  shake(0.18);
  flashScreen('#fff', 110, 0.3);
  burst(p0.t.group.position.clone(), 0xffffff, 16, 3.2);
  burst(p0.t.group.position.clone(), parseInt(ELEMS[skill.elem].color.slice(1),16), 14, 2.6);
  await applyDamage(p0.t, p0.dmg, u);
  await tween(260, k=>{ u.group.position.lerpVectors(to, from, easeOut(k)); });
  u.group.position.copy(from);
  u.group.rotation.y = u.baseRotY;
  u.busy = false;
}
async function rangedAttack(u, plans, skill){
  u.busy = true;
  const col = parseInt(ELEMS[skill.elem].color.slice(1),16);
  showBanner(`${bannerName(u)}の ${skill.name}！`, 800);
  sndMagic();
  burst(u.group.position.clone().add(new THREE.Vector3(0,0.6,0)), col, 12, 1.6, 0.8, -1);
  flashBody(u, col, 250);
  await tween(200, k=>{ u.group.position.y = u.home.y + Math.sin(k*Math.PI)*0.5; });
  await Promise.all(plans.map(async (p,ti)=>{
    await sleep(ti*90);
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.2,10,8),
      new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:0.95 })
    );
    const from = u.group.position.clone().add(new THREE.Vector3(0,0.5,0));
    const to = p.t.group.position.clone();
    scene.add(m);
    await tween(320, k=>{
      m.position.lerpVectors(from, to, k);
      m.position.y += Math.sin(k*Math.PI)*1.4;
      m.scale.setScalar(1+Math.sin(k*Math.PI)*0.7);
    });
    scene.remove(m);
    sndHit();
    shake(0.14);
    burst(to, col, 20, 3.0);
    await applyDamage(p.t, p.dmg, u);
  }));
  u.busy = false;
}
async function healAction(u, skill){
  u.busy = true;
  showBanner(`${bannerName(u)}の ${skill.name}！`, 800);
  sndHeal();
  flashBody(u, 0x33ff66, 350);
  await tween(300, k=>{ u.group.position.y = u.home.y + Math.sin(k*Math.PI)*0.6; u.group.rotation.y += 0.2; });
  const amt = Math.round(effAtk(u)*skill.mult);
  for(const a of aliveOf(u.side)){
    burst(a.group.position.clone().add(new THREE.Vector3(0,-0.3,0)), 0x6dffa0, 14, 1.4, 0.9, -2.5);
    applyHeal(a, amt);
  }
  await sleep(380);
  u.group.rotation.y = u.baseRotY;
  u.busy = false;
}
async function performSkill(u, skill){
  if(skill.elem==='heal' || skill.target==='allies'){ await healAction(u, skill); return; }
  const oppList = aliveOf(otherSide(u.side));
  if(oppList.length===0) return;
  // ★同期ポイント: 対象とダメージをシード乱数で確定
  const targets = skill.target==='all' ? [...oppList] : [oppList[gri(oppList.length)]];
  const atk = effAtk(u);
  const plans = targets.map(t=>({ t, dmg:calcDmg(atk, skill.mult) }));
  if((skill.elem==='phys'||skill.elem==='slash') && skill.target!=='all') await meleeAttack(u, plans, skill);
  else await rangedAttack(u, plans, skill);
}
async function aiAction(u){
  if(aliveOf(otherSide(u.side)).length===0) return;
  const skill = u.data.skills[gri(u.data.skills.length)];
  await performSkill(u, skill);
}

/* ---------------- SPカード発動 ---------------- */
async function spAction(side, idx){
  state.spUsed[side] = true;
  const sp = SP_CARDS[idx];
  const opp = otherSide(side);
  const mine = (side===state.mySide);
  sndSp();
  showBanner(`🃏 ${mine?'':'あいての'}SPカード『${sp.name}』！`, 1600, 'sp');
  flashScreen(hexCss(sp.color), 320, 0.5);
  await sleep(750);
  switch(sp.type){
    case 'attack': {
      const baseAtk = aliveOf(side).reduce((s,u)=>s+effAtk(u), 0);
      const targets = [...aliveOf(opp)];
      const dmgs = targets.map(()=>Math.max(1, Math.round(baseAtk*0.9*grand(0.9,1.1))));
      shake(0.4);
      for(let i=0;i<targets.length;i++){
        burst(targets[i].group.position.clone(), sp.color, 22, 3.4, 1.2);
        await applyDamage(targets[i], dmgs[i], null, 'big');
        await sleep(100);
      }
      break;
    }
    case 'heal': {
      sndHeal();
      for(const a of aliveOf(side)){
        burst(a.group.position.clone(), 0x6dffa0, 18, 1.6, 1.0, -2.5);
        applyHeal(a, Math.round(a.maxHp*0.35));
      }
      await sleep(500);
      break;
    }
    case 'atkdown': {
      addMod(opp, 'atk', 0.7, 2);
      for(const u of aliveOf(opp)){ burst(u.group.position.clone(), sp.color, 14, 1.8); flashBody(u, sp.color, 500); }
      showBanner(`${mine?'相手':'味方'}全体の攻撃力ダウン！(2ターン)`, 1200, 'sp');
      await sleep(700);
      break;
    }
    case 'spddown': {
      addMod(opp, 'spd', 0.6, 2);
      for(const u of aliveOf(opp)){ burst(u.group.position.clone(), sp.color, 14, 1.8); flashBody(u, sp.color, 500); }
      showBanner(`${mine?'相手':'味方'}全体の速度ダウン！(2ターン)`, 1200, 'sp');
      await sleep(700);
      break;
    }
    case 'guard': {
      addMod(side, 'def', 0.6, 2);
      for(const u of aliveOf(side)){ burst(u.group.position.clone(), sp.color, 14, 1.6, 1, -2); flashBody(u, sp.color, 500); }
      showBanner(`${mine?'味方':'相手'}全体にイージスの守り！(2ターン)`, 1200, 'sp');
      await sleep(700);
      break;
    }
    case 'charge': {
      addGaugeFor(side, 40);
      const z = mine ? 2.6 : -3.0;
      burst(new THREE.Vector3(0,1.2,z), sp.color, 30, 2.5, 1.2, -1);
      showBanner('必殺ゲージ +40%！', 1200, 'sp');
      await sleep(700);
      break;
    }
  }
}

/* ---------------- 突撃 (じゃんけん) ---------------- */
async function raidAction(side, hand){
  state.raidUsed[side] = true;
  const opp = otherSide(side);
  const oppHand = gri(3);
  const mine = (side===state.mySide);
  sndRaid();
  showBanner(`⚡ ${mine?'':'あいての'}突撃！ じゃんけん勝負！ ⚡`, 1300, 'raid');
  flashScreen('#ffb0e0', 280, 0.4);
  await sleep(1000);
  showBanner(`${mine?'自分':'あいて'} ${HANDS[hand]}　vs　${HANDS[oppHand]} ${mine?'あいて':'自分'}`, 1400, 'raid');
  shake(0.25);
  await sleep(1100);
  const r = janken(hand, oppHand);
  if(r===1){
    const stolen = state.gauge[opp];
    state.gauge[opp] = 0;
    state.gauge[side] = Math.min(100, state.gauge[side]+stolen);
    updateGaugeUI();
    const fz = (opp===state.mySide) ? 2.6 : -3.0;
    const tz = (side===state.mySide) ? 2.6 : -3.0;
    burst(new THREE.Vector3(0,1.2,fz), 0x7df0ff, 26, 3.0);
    burst(new THREE.Vector3(0,1.2,tz), 0x7df0ff, 26, 3.0, 1.1, -1);
    flashScreen('#7df0ff', 350, 0.6);
    showBanner(mine ? `突撃成功！ ゲージ${stolen}%を強奪！！` : `あいてにゲージ${stolen}%を奪われた！`, 1500, 'raid');
  } else if(r===-1){
    const stolen = Math.floor(state.gauge[side]/2);
    state.gauge[side] -= stolen;
    state.gauge[opp] = Math.min(100, state.gauge[opp]+stolen);
    updateGaugeUI();
    flashScreen('#ff6a6a', 350, 0.5);
    showBanner(mine ? `返り討ち！ ゲージ${stolen}%を奪われた…` : `返り討ち成功！ ゲージ${stolen}%を強奪！`, 1500, 'raid');
  } else {
    showBanner('あいこ！ 突撃は引き分けに終わった', 1300, 'raid');
  }
  await sleep(800);
}

/* ---------------- 合体技演出 ---------------- */
async function fusionAttack(pair, recipe){
  const [p1, p2] = pair;
  const side = p1.u.side;
  const mine = p1.u.isAlly;
  p1.u.busy = true; p2.u.busy = true;
  const col = parseInt(recipe.color.slice(1),16);
  sndFusion();
  showBanner(`⚡${mine?'':'あいての'}合体技『${recipe.name}』！！⚡`, 1600, 'fusion');
  flashScreen(recipe.color, 280, 0.55);
  flashBody(p1.u, col, 1400); flashBody(p2.u, col, 1400);
  const zc = mine ? 1.2 : -1.6;
  const c1 = new THREE.Vector3(-0.7, 1.1, zc), c2 = new THREE.Vector3(0.7, 1.1, zc);
  const f1 = p1.u.home.clone(), f2 = p2.u.home.clone();
  await tween(380, k=>{
    const e = easeInOut(k);
    p1.u.group.position.lerpVectors(f1, c1, e);
    p2.u.group.position.lerpVectors(f2, c2, e);
    p1.u.group.rotation.y += 0.3; p2.u.group.rotation.y -= 0.3;
  });
  const chargePos = new THREE.Vector3(0, 1.2, zc);
  for(let i=0;i<3;i++){
    burst(chargePos, col, 16, 2.2, 1.0, -1);
    snd(330+i*220, 0.12, 'square', 0.08);
    await sleep(160);
  }
  const oppTargets = [...aliveOf(otherSide(side))];
  const dmgBase = effAtk(p1.u) + effAtk(p2.u);
  if(recipe.blessing){
    flashScreen('#fff8d0', 400, 0.8);
    sndHeal();
    const healAmt = Math.round(dmgBase*0.9);
    const dmgs = oppTargets.map(()=>calcDmg(dmgBase, recipe.mult));
    for(const a of aliveOf(side)){
      burst(a.group.position.clone(), 0xfff0aa, 22, 1.8, 1.1, -2.5);
      applyHeal(a, healAmt);
    }
    await sleep(400);
    for(let i=0;i<oppTargets.length;i++){
      burst(oppTargets[i].group.position.clone(), 0xfff0aa, 18, 2.6);
      await applyDamage(oppTargets[i], dmgs[i], p1.u);
    }
  } else {
    const dmgs = oppTargets.map(()=>calcDmg(dmgBase, recipe.mult));
    const beamMat = new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending });
    const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.5,1.1,10,16,1,true), beamMat);
    beam.rotation.x = Math.PI/2;
    beam.position.set(0, 1.1, mine ? -2.2 : 1.9);
    scene.add(beam);
    beam.scale.set(0.05,1,0.05);
    snd(150,0.5,'sawtooth',0.15,500);
    await tween(300, k=>{ const e = easeOut(k); beam.scale.set(e,1,e); });
    flashScreen(recipe.color, 350, 0.75);
    shake(0.55);
    for(let i=0;i<oppTargets.length;i++){
      burst(oppTargets[i].group.position.clone(), col, 30, 4.2, 1.3);
      burst(oppTargets[i].group.position.clone(), 0xffffff, 14, 3.0);
      await applyDamage(oppTargets[i], dmgs[i], p1.u, 'big');
      await sleep(90);
    }
    await tween(250, k=>{ beamMat.opacity = 0.9*(1-k); beam.scale.x = beam.scale.z = 1+k*0.8; });
    scene.remove(beam);
  }
  await tween(320, k=>{
    const e = easeOut(k);
    p1.u.group.position.lerpVectors(c1, f1, e);
    p2.u.group.position.lerpVectors(c2, f2, e);
  });
  p1.u.group.position.copy(f1); p2.u.group.position.copy(f2);
  p1.u.group.rotation.y = p1.u.baseRotY; p2.u.group.rotation.y = p2.u.baseRotY;
  p1.u.busy = false; p2.u.busy = false;
}

/* ---------------- 超必殺技演出 ---------------- */
async function ultimateAttack(side){
  state.gauge[side] = 0;
  updateGaugeUI();
  const units = aliveOf(side);
  if(units.length===0) return;
  const mine = units[0].isAlly;
  sndUlt();
  showBanner(`✦${mine?'':'あいての'}超必殺技『${ULT.name}』！！✦`, 2000, 'ult');
  flashScreen('#aef4ff', 300, 0.6);
  for(const a of units){ a.busy = true; flashBody(a, 0x55ccff, 2200); }
  await tween(450, k=>{
    const e = easeOut(k);
    for(const a of units) a.group.position.y = a.home.y + e*1.4;
  });
  const ballMat = new THREE.MeshBasicMaterial({ color:0x7df0ff, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending });
  const ball = new THREE.Mesh(new THREE.SphereGeometry(1,20,16), ballMat);
  ball.position.set(0, 3.2, mine ? 1.5 : -1.8);
  ball.scale.setScalar(0.05);
  scene.add(ball);
  for(let i=0;i<4;i++){
    burst(ball.position.clone(), 0x7df0ff, 14, 2.5, 1.0, -1);
    snd(440+i*180, 0.12, 'sine', 0.09);
    await tween(150, k=>{ ball.scale.setScalar(0.05 + (i+k)*0.32); });
  }
  snd(100,0.7,'sawtooth',0.18,700);
  const from = ball.position.clone(), to = new THREE.Vector3(0, 1.0, mine ? -3.0 : 2.6);
  await tween(280, k=>{
    ball.position.lerpVectors(from, to, easeIn(k));
    ball.rotation.y += 0.5;
  });
  scene.remove(ball);
  flashScreen('#ffffff', 500, 0.95);
  shake(0.9);
  sndHit(); setTimeout(sndHit, 120); setTimeout(sndHit, 260);
  burst(to, 0x7df0ff, 50, 5.5, 1.6);
  burst(to, 0xffffff, 30, 4.5, 1.3);
  burst(to, 0xffe14d, 25, 3.5, 1.2);
  const totalAtk = units.reduce((s,a)=>s+effAtk(a), 0);
  const oppTargets = [...aliveOf(otherSide(side))];
  const dmgs = oppTargets.map(()=>calcDmg(totalAtk, ULT.mult));
  for(let i=0;i<oppTargets.length;i++){
    burst(oppTargets[i].group.position.clone(), 0x7df0ff, 22, 3.5);
    await applyDamage(oppTargets[i], dmgs[i], units[0], 'big');
    await sleep(110);
  }
  await tween(380, k=>{
    const e = easeOut(k);
    for(const a of units) a.group.position.y = a.home.y + (1-e)*1.4;
  });
  for(const a of units){ a.group.position.y = a.home.y; a.busy = false; }
}

/* ---------------- ターン実行 ---------------- */
function checkEnd(){
  if(aliveOf(otherSide(state.mySide)).length===0) return 'win';
  if(aliveOf(state.mySide).length===0) return 'lose';
  return null;
}
/* plans = { A:{sel,ult,sp,raidHand}|{ai:true}, B:... } */
async function runTurnWith(plans){
  state.phase = 'anim';
  lockSelectionUI();
  $('#banner').innerHTML = '';

  const acts = [];
  for(const side of ['A','B']){
    const p = plans[side];
    if(!p) continue;
    if(p.ai){
      // PvE 敵AI: SP/突撃も確率で使用
      if(!state.raidUsed[side] && state.gauge[otherSide(side)]>=50 && grand(0,1)<0.3){
        acts.push({ speed: side==='A'?30000:29998, run:()=>raidAction(side, gri(3)) });
      }
      if(!state.spUsed[side] && state.turn>=2 && grand(0,1)<0.3){
        acts.push({ speed: side==='A'?20000:19998, run:()=>spAction(side, gri(SP_CARDS.length)) });
      }
      for(const e of aliveOf(side)){
        acts.push({ speed:effSpd(e)+grand(0,2), run:()=>aiAction(e), check:()=>e.alive });
      }
      continue;
    }
    if(p.raidHand!==null && p.raidHand!==undefined && !state.raidUsed[side]){
      acts.push({ speed: side==='A'?30000:29998, run:()=>raidAction(side, p.raidHand) });
    }
    if(p.sp!==null && p.sp!==undefined && !state.spUsed[side]){
      acts.push({ speed: side==='A'?20000:19998, run:()=>spAction(side, p.sp) });
    }
    if(p.ult && state.gauge[side]>=100){
      acts.push({ speed: side==='A'?9999:9998, run:()=>ultimateAttack(side) });
      continue;
    }
    const fusion = findFusionFor(side, p.sel);
    const fused = fusion ? [fusion.pair[0].u, fusion.pair[1].u] : [];
    if(fusion){
      acts.push({
        speed: 999 - (side==='A'?0:1),
        run: ()=>fusionAttack(fusion.pair, fusion.recipe),
        check: ()=>fusion.pair[0].u.alive && fusion.pair[1].u.alive
      });
    }
    state.units[side].forEach((u,i)=>{
      if(!u.alive || p.sel[i]===null || fused.includes(u)) return;
      const skill = u.data.skills[p.sel[i]];
      acts.push({ speed:effSpd(u)+grand(0,2), run:()=>performSkill(u, skill), check:()=>u.alive });
    });
  }
  acts.sort((a,b)=>b.speed-a.speed);

  for(const act of acts){
    if(state.ended) return;
    if(checkEnd()) break;
    if(act.check && !act.check()) continue;
    await act.run();
    await sleep(180);
  }

  if(state.ended) return;
  const end = checkEnd();
  if(end){ await endBattle(end==='win'); return; }
  if(state.mode==='pvp' && pvp.lostConn){
    showBanner('あいてとの通信がきれた！', 1500);
    await sleep(900);
    await endBattle(true, '（あいてが切断したため勝利）');
    return;
  }
  decayMods();
  state.turn++;
  startSelection();
  if(state.mode==='pvp') tryResolve();
}

/* ---------------- バトル終了 → 報酬/進行 ---------------- */
function rollReward(boost){
  const r = Math.random();
  const rare = boost
    ? (r<0.25?1 : r<0.55?2 : r<0.80?3 : r<0.94?4 : 5)
    : (r<0.40?1 : r<0.72?2 : r<0.90?3 : r<0.98?4 : 5);
  const cands = CARD_POOL.filter(c=>c.rare===rare);
  return cands[Math.floor(Math.random()*cands.length)];
}
async function endBattle(win, note){
  if(state.ended) return;
  state.ended = true;
  await sleep(450);
  if(win){
    sndWin();
    showBanner('WIN！！', 1400);
    flashScreen('#ffe27a', 500, 0.5);
    const alive = aliveOf(state.mySide);
    for(let j=0;j<2;j++){
      await tween(300, k=>{
        for(const a of alive) a.group.position.y = a.home.y + Math.sin(k*Math.PI)*0.8;
      });
    }
  } else {
    sndLose();
    showBanner('LOSE...', 1400);
  }
  await sleep(900);

  const isPvp = state.mode==='pvp';
  const wasBoss = state.bossBattle;
  if(isPvp) cleanupPvp();

  // PvE 進行処理
  let progMsg = '';
  if(!isPvp){
    if(win){
      state.streak++;
      if(state.stageBattle>=STAGE_LEN){
        if(state.stage>=STAGE_MAX){
          state.allClear = true;
          state.stageBattle = 1;
          progMsg = `🏆 全ステージ制覇！！おめでとう！！ 🏆\n(ステージ${STAGE_MAX}を周回できます)`;
        } else {
          progMsg = `🎉 ステージ${state.stage} クリア！ ステージ${state.stage+1}へ！`;
          state.stage++;
          state.stageBattle = 1;
        }
      } else {
        state.stageBattle++;
        progMsg = wasBoss ? `👑 ボス撃破！ 次は第${state.stageBattle}戦！` : `次は第${state.stageBattle}戦！ (連勝${state.streak})`;
      }
    } else {
      state.stageBattle = 1;
      state.streak = 0;
      progMsg = `ステージ${state.stage}の最初からやり直し…`;
    }
  }

  // 報酬: 勝敗問わず1枚 (重複はレベルアップ)
  const reward = rollReward(win && wasBoss);
  const cur = state.owned[reward.id];
  let dropMsg, isNew = false;
  if(!cur){ state.owned[reward.id] = 1; isNew = true; dropMsg = '✨NEW！ 新モンスター発見！'; }
  else if(cur < MAX_LV){ state.owned[reward.id] = cur+1; dropMsg = `⬆ レベルアップ！ Lv${cur} → Lv${cur+1}`; }
  else dropMsg = 'Lv MAX！ (これ以上は強化できない)';
  saveGame();

  $('#result-title').textContent = win ? 'WIN！！' : 'LOSE...';
  $('#result-title').className = win ? 'win' : 'lose';
  $('#result-msg').textContent = isPvp
    ? (win ? `合言葉マッチに勝利！ ${note||''}` : '合言葉マッチで敗北… リベンジだ！')
    : progMsg;
  const lvNow = state.owned[reward.id];
  const inst = instCard(reward.id, lvNow);
  const rc = $('#reward-card');
  rc.style.animation = 'none';
  void rc.offsetWidth;
  rc.style.animation = '';
  rc.innerHTML = `
    <div class="glyph g-${reward.shape}" style="background:${hexCss(reward.color)};border-color:${hexCss(reward.color)}"></div>
    <div class="rc-name">${reward.name}</div>
    <div class="rc-rare">${'★'.repeat(reward.rare)} Lv${lvNow}</div>
    <div class="rc-stats">HP ${inst.hp} ／ 攻撃 ${inst.atk} ／ 速さ ${inst.spd}<br>Ⓐ ${reward.skills[0].name}<br>Ⓑ ${reward.skills[1].name}</div>
    <div class="rc-new ${isNew?'':'lvup'}">${dropMsg}</div>`;
  showScreen('result');
}
$('#next-btn').addEventListener('click', ()=>{ sndSelect(); state.mode='pve'; renderSelect(); });

/* ---------------- 起動 ---------------- */
loadGame();
saveGame();
renderSelect();
onResize();
</script>
